<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字水晶配方</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#FAF6F0;min-height:100vh;color:#4a3728;}
.app{padding:1.5rem 1.25rem;position:relative;overflow-x:hidden;}
.dot{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.crystal-deco{position:fixed;pointer-events:none;opacity:0.18;z-index:0;}
.wrap{position:relative;z-index:2;max-width:600px;margin:0 auto;}
.hdr{text-align:center;margin-bottom:1.5rem;padding-top:.5rem;}
.hdr-crystals{display:flex;justify-content:center;gap:1rem;margin-bottom:.75rem;align-items:flex-end;}
.ttl{font-family:'Noto Serif TC',serif;font-size:1.6rem;font-weight:600;color:#4a3728;margin-bottom:.25rem;letter-spacing:.05em;}
.sub{font-size:.78rem;color:#9b7e6a;letter-spacing:.1em;}
.card{background:#fff;border-radius:16px;padding:1.25rem;margin-bottom:.85rem;border:1.5px solid #e8d8cc;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.card-pink::before{background:linear-gradient(90deg,#E89AAE,#F0B87A);}
.card-teal::before{background:linear-gradient(90deg,#7EC8C8,#C4A8D4);}
.card-purple::before{background:linear-gradient(90deg,#C4A8D4,#E89AAE);}
.card-orange::before{background:linear-gradient(90deg,#F0B87A,#E8A898);}
.ctitle{font-family:'Noto Serif TC',serif;font-size:.85rem;color:#7a5a48;letter-spacing:.1em;margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;}
label{display:block;font-size:.72rem;color:#9b7e6a;margin-bottom:.28rem;}
input,select{width:100%;background:#FAF6F0;border:1.5px solid #e0cfc4;border-radius:10px;padding:.52rem .75rem;color:#4a3728;font-size:.82rem;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;appearance:none;}
input:focus,select:focus{border-color:#C4A8D4;}
select option{background:#fff;color:#4a3728;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.pbtn{background:#FAF6F0;border:1.5px solid #e0cfc4;border-radius:12px;padding:.65rem .3rem;color:#7a5a48;font-size:.75rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:center;transition:all .2s;line-height:1.4;}
.pbtn:hover{border-color:#C4A8D4;background:#f5eef8;}
.pbtn.active{background:linear-gradient(135deg,#f5eef8,#e8f4f4);border-color:#C4A8D4;color:#6b3f8a;box-shadow:0 2px 8px rgba(196,168,212,.3);}
.pemi{font-size:1.15rem;display:block;margin-bottom:.15rem;}
.mode-tabs{display:flex;gap:.5rem;margin-bottom:.85rem;}
.mtab{flex:1;padding:.5rem;background:#fff;border:1.5px solid #e0cfc4;border-radius:10px;font-size:.78rem;color:#9b7e6a;cursor:pointer;text-align:center;transition:all .2s;font-family:'Noto Sans TC',sans-serif;}
.mtab.active{background:linear-gradient(135deg,#f5eef8,#e8f4f4);border-color:#C4A8D4;color:#6b3f8a;}
.mode-sec{display:none;}
.mode-sec.active{display:block;}
.gbtn{width:100%;padding:.85rem;background:linear-gradient(135deg,#E89AAE,#C4A8D4);border:none;border-radius:14px;color:#fff;font-size:.95rem;font-family:'Noto Serif TC',serif;font-weight:600;cursor:pointer;letter-spacing:.12em;transition:all .25s;box-shadow:0 4px 16px rgba(232,154,174,.35);margin-top:.4rem;}
.gbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,154,174,.45);}
.rcard{display:none;}
.rcard.show{display:block;}
.rhdr{text-align:center;margin-bottom:1.1rem;padding-bottom:.9rem;border-bottom:1.5px dashed #e8d8cc;}
.rttl{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:#4a3728;margin-bottom:.2rem;}
.rsub{font-size:.75rem;color:#9b7e6a;}
.slabel{font-size:.7rem;color:#b09080;letter-spacing:.1em;margin-bottom:.4rem;margin-top:.1rem;}
.pillar-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin:.55rem 0;}
.pillar{background:#FAF6F0;border:1.5px solid #e8d8cc;border-radius:10px;padding:.5rem;text-align:center;}
.p-lbl{font-size:.62rem;color:#b09080;margin-bottom:.22rem;}
.p-tg{font-family:'Noto Serif TC',serif;font-size:1.25rem;line-height:1.1;}
.p-dz{font-family:'Noto Serif TC',serif;font-size:1.25rem;line-height:1.1;}
.p-wx{font-size:.62rem;margin-top:.2rem;}
.strength-bar{background:#f0e8e0;border-radius:20px;height:7px;margin:.4rem 0;overflow:hidden;}
.strength-fill{height:100%;border-radius:20px;transition:width .6s;}
.wx-row{display:flex;gap:.35rem;flex-wrap:wrap;margin:.45rem 0;}
.wx-chip{border-radius:12px;padding:.22rem .6rem;font-size:.72rem;border:1.5px solid;}
.wx-miss{background:#fff0f0;border-color:#f0b8b8;color:#c06060;}
.wx-weak{background:#fff8ee;border-color:#f0d898;color:#a07030;}
.wx-ok{background:#eef8ee;border-color:#a8d8a8;color:#508050;}
.xyshen-box{background:linear-gradient(135deg,#fdf8ff,#f0fafa);border:1.5px solid #e0d0ec;border-radius:12px;padding:.75rem;margin:.55rem 0;}
.xy-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem;}
.xy-chip{border-radius:10px;padding:.22rem .65rem;font-size:.72rem;font-weight:500;}
.xy-like{background:#eef8f0;border:1.5px solid #a8d8b8;color:#407050;}
.xy-hate{background:#fff0f0;border:1.5px solid #f0b8b8;color:#905050;}
.formula-tabs{display:flex;gap:.35rem;flex-wrap:wrap;margin:.55rem 0;}
.ftab{background:#FAF6F0;border:1.5px solid #e0cfc4;border-radius:8px;padding:.35rem .65rem;font-size:.72rem;color:#9b7e6a;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;}
.ftab.active{background:#fff;border-color:#C4A8D4;color:#6b3f8a;}
.formula-panel{display:none;}
.formula-panel.active{display:block;}
.fblock{background:#fff;border-left:3px solid #C4A8D4;border-radius:0 10px 10px 0;padding:.72rem .88rem;margin-bottom:.5rem;font-size:.8rem;line-height:1.75;color:#6a5040;}
.fblock strong{color:#7a5a48;font-weight:600;}
.crow{display:flex;gap:.45rem;flex-wrap:wrap;margin:.45rem 0;}
.cchip{background:#FAF6F0;border:1.5px solid #e8d8cc;border-radius:14px;padding:.32rem .78rem;font-size:.78rem;display:flex;align-items:center;gap:.32rem;color:#5a4030;}
.cdot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.warn-box{background:#fff8f0;border:1.5px solid #f0d0b0;border-radius:10px;padding:.55rem .8rem;font-size:.75rem;color:#a06030;margin:.45rem 0;}
.ok-box{background:#f0f8f0;border:1.5px solid #b0d8b0;border-radius:10px;padding:.55rem .8rem;font-size:.75rem;color:#407040;margin:.45rem 0;}
.div{height:1px;background:repeating-linear-gradient(90deg,#e8d8cc 0,#e8d8cc 6px,transparent 6px,transparent 12px);margin:.7rem 0;}
.rbtn{width:100%;padding:.5rem;background:transparent;border:1.5px dashed #e0cfc4;border-radius:10px;color:#b09080;font-size:.78rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:.6rem;transition:all .2s;}
.rbtn:hover{border-color:#C4A8D4;color:#9b7e6a;}
@media(max-width:480px){.g2{grid-template-columns:1fr;}.pgrid{grid-template-columns:repeat(2,1fr);}.pillar-row{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

<script>
const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const TG_WX={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const DZ_WX={子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'};
const MONTH_DZ=['','寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
const MONTH_TG_BASE={甲:2,乙:4,丙:6,丁:8,戊:0,己:2,庚:4,辛:6,壬:8,癸:0};
const MONTH_SEASON={1:'木',2:'木',3:'木',4:'火',5:'火',6:'火',7:'金',8:'金',9:'金',10:'水',11:'水',12:'水'};
const WX_COLOR={木:'#4a9a4a',火:'#cc4422',土:'#bb8800',金:'#999900',水:'#3366cc'};
const WX_EMO={木:'🌿',火:'🔥',土:'🪨',金:'⚡',水:'💧'};
const WX_CRYSTAL_COLOR={木:'#7EC8C8',火:'#E89AAE',土:'#F0B87A',金:'#e8e0c0',水:'#a0b8e0'};
const RELATION={木:{木:'比劫',火:'食傷',土:'財星',金:'官殺',水:'印星'},火:{火:'比劫',土:'食傷',金:'財星',水:'官殺',木:'印星'},土:{土:'比劫',金:'食傷',水:'財星',木:'官殺',火:'印星'},金:{金:'比劫',水:'食傷',木:'財星',火:'官殺',土:'印星'},水:{水:'比劫',木:'食傷',火:'財星',土:'官殺',金:'印星'}};

function isLeap(y){return(y%4===0&&y%100!==0)||(y%400===0);}
function getYearGZ(y){const ti=(y-4)%10,di=(y-4)%12;const tg=TG[(ti+10)%10],dz=DZ[(di+12)%12];return{tg,dz,wx_tg:TG_WX[tg],wx_dz:DZ_WX[dz]};}
function getMonthGZ(y,m){const yp=getYearGZ(y);const base=MONTH_TG_BASE[yp.tg];const tg=TG[(base+m-1)%10];const dz=MONTH_DZ[m];return{tg,dz,wx_tg:TG_WX[tg],wx_dz:DZ_WX[dz]};}
function getDayGZ(y,m,d){let total=0;for(let i=1900;i<y;i++)total+=(isLeap(i)?366:365);const days=[0,31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31];for(let i=1;i<m;i++)total+=days[i];total+=d;const tg=TG[(total+6)%10],dz=DZ[(total+6)%12];return{tg,dz,wx_tg:TG_WX[tg],wx_dz:DZ_WX[dz]};}
function getHourGZ(dayTg,hIdx){const dayIdx=TG.indexOf(dayTg);const base=[0,2,4,6,8,0,2,4,6,8][dayIdx];const tg=TG[(base+hIdx)%10],dz=DZ[hIdx];return{tg,dz,wx_tg:TG_WX[tg],wx_dz:DZ_WX[dz]};}

function analyzeChart(pillars,month){
  const dayWX=pillars[2].wx_tg;
  const seasonWX=MONTH_SEASON[month];
  const wxCount={木:0,火:0,土:0,金:0,水:0};
  pillars.forEach(p=>{wxCount[p.wx_tg]++;wxCount[p.wx_dz]++;});
  const helpWX={木:['木','水'],火:['火','木'],土:['土','火'],金:['金','土'],水:['水','金']};
  const gotSeason=helpWX[dayWX].includes(seasonWX);
  let helpScore=0,weakenScore=0;
  pillars.forEach((p,i)=>{if(i===2)return;[p.wx_tg,p.wx_dz].forEach(wx=>{const rel=RELATION[dayWX][wx];if(rel==='比劫'||rel==='印星')helpScore++;else weakenScore++;});});
  if(gotSeason)helpScore+=2;
  const isStrong=helpScore>=weakenScore;
  const strength=Math.min(100,Math.round((helpScore/(helpScore+weakenScore||1))*100));
  let xishen=[],jishen=[];
  const wxList=['木','火','土','金','水'];
  if(isStrong){wxList.forEach(wx=>{const r=RELATION[dayWX][wx];if(r==='食傷'||r==='財星'||r==='官殺')xishen.push(wx);else jishen.push(wx);});}
  else{wxList.forEach(wx=>{const r=RELATION[dayWX][wx];if(r==='比劫'||r==='印星')xishen.push(wx);else jishen.push(wx);});}
  return{dayWX,isStrong,strength,wxCount,xishen,jishen,seasonWX,gotSeason};
}

const CRYSTALS={

    {name:'巳酉丑三合金局',wx:'金',members:['巳蛇','酉雞','丑牛'],cr:[{n:'石榴石',wx:'火',dot:'#aa2200'},{n:'金髮晶',wx:'金',dot:'#ddaa00'},{n:'黃水晶',wx:'土',dot:'#cc8800'}],desc:'變革之金，極強正財庫與自律'},

const PURPOSE_CONFIG={
  love:{label:'愛情守護',emoji:'💕',strong:['丙辛合化水','申子辰三合水局'],weak:['丁壬合化木','亥卯未三合木局'],couple:'申子辰三合水局'},
  wealth:{label:'招財進寶',emoji:'💰',strong:['乙庚合化金','巳酉丑三合金局'],weak:['甲己合化土','亥卯未三合木局'],couple:'巳酉丑三合金局'},
  noble:{label:'招貴人',emoji:'👑',strong:['乙庚合化金','亥卯未三合木局'],weak:['甲己合化土','寅午戌三合火局'],couple:'亥卯未三合木局'},
  protection:{label:'護身辟邪',emoji:'🛡️',strong:['申子辰三合水局','丙辛合化水'],weak:['甲己合化土','巳酉丑三合金局'],couple:'申子辰三合水局'},
  wisdom:{label:'智慧開運',emoji:'🌟',strong:['申子辰三合水局','丙辛合化水'],weak:['甲己合化土','亥卯未三合木局'],couple:'申子辰三合水局'},
  health:{label:'健康活力',emoji:'🌿',strong:['甲己合化土','亥卯未三合木局'],weak:['甲己合化土','亥卯未三合木局'],couple:'甲己合化土'},
};
const PURPOSES=Object.entries(PURPOSE_CONFIG).map(([id,v])=>({id,...v}));

let curMode='single',selP1=null,selP2=null;

function setMode(m,el){curMode=m;document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.mode-sec').forEach(s=>s.classList.remove('active'));document.getElementById('m-'+m).classList.add('active');}

function initDots(){
  const colors=['#E89AAE','#7EC8C8','#C4A8D4','#F0B87A','#E8A898','#a8d8a8'];
  const bg=document.getElementById('dots-bg');
  for(let i=0;i<35;i++){
    const d=document.createElement('div');d.className='dot';
    const sz=Math.random()*5+2;
    const c=colors[Math.floor(Math.random()*colors.length)];
    d.style.cssText=`width:${sz}px;height:${sz}px;background:${c};opacity:${.3+Math.random()*.4};left:${Math.random()*100}%;top:${Math.random()*2000}px;`;
    bg.appendChild(d);
  }
}

function initPGrid(id,setFn){
  const g=document.getElementById(id);if(!g)return;
  PURPOSES.forEach(p=>{
    const b=document.createElement('button');b.className='pbtn';b.id=id+'-'+p.id;
    b.innerHTML=`<span class="pemi">${p.emoji}</span>${p.label}`;
    b.onclick=()=>{setFn(p.id);document.querySelectorAll('#'+id+' .pbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
    g.appendChild(b);
  });
}

function initDays(){
  ['d1','d2a','d2b'].forEach(id=>{const s=document.getElementById(id);if(!s)return;for(let i=1;i<=31;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';s.appendChild(o);}});
}

function crystalSVG(color,w,h){return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none"><polygon points="${w/2},0 ${w-2},${h*.22} ${w-2},${h*.78} ${w/2},${h} 2,${h*.78} 2,${h*.22}" fill="${color}" stroke="#fff" stroke-width="1.2" opacity=".85"/><line x1="${w/2}" y1="0" x2="${w/2}" y2="${h}" stroke="#fff" stroke-width="1" opacity=".5"/><line x1="2" y1="${h*.22}" x2="${w-2}" y2="${h*.22}" stroke="#fff" stroke-width=".7" opacity=".4"/></svg>`;}

function findMethod(name){return ADV.tg.find(m=>m.name===name)||ADV.sh.find(m=>m.name===name);}
function isTG(name){return !!ADV.tg.find(m=>m.name===name);}

function renderPillar(p,label){return `<div class="pillar"><div class="p-lbl">${label}</div><div class="p-tg" style="color:${WX_COLOR[p.wx_tg]}">${p.tg}</div><div class="p-dz" style="color:${WX_COLOR[p.wx_dz]}">${p.dz}</div><div class="p-wx" style="color:${WX_COLOR[p.wx_tg]}">${WX_EMO[p.wx_tg]}${p.wx_tg}</div></div>`;}

function renderCrystalChip(name,dot,note){return `<div class="cchip"><span class="cdot" style="background:${dot};box-shadow:0 0 5px ${dot}88"></span>${name}${note?`<span style="font-size:.65rem;color:#b09080"> ${note}</span>`:''}</div>`;}

function renderMethodPanel(key,ana,idx,isFirst){
  const m=findMethod(key);if(!m)return'';
  const suitable=ana?ana.xishen.includes(m.wx):true;
  let html=`<div class="formula-panel${isFirst?' active':''}" id="fp${idx}">`;
  html+=`<div class="fblock"><strong>${m.name}</strong>（化氣→${WX_EMO[m.wx]}${m.wx}）<br><span style="color:#8a7060">${m.desc}</span>`;
  if(ana){if(suitable)html+=`<br><span style="color:#508050">✅ 化出的「${m.wx}」是您的喜用神，強烈推薦！</span>`;else html+=`<br><span style="color:#b06040">⚠️ 非喜用神，僅限特殊場合短期佩戴</span>`;}
  html+='</div>';
  if(isTG(key)){
    html+=`<div class="slabel">水晶搭配（1:1 比例，左手佩戴）</div><div class="crow">`;
    m.a.cr.forEach(c=>{const d=(CRYSTALS[m.a.wx]||[]).find(x=>x.name===c);html+=renderCrystalChip(c,d?d.dot:'#aaa',m.a.tg);});
    m.b.cr.forEach(c=>{const d=(CRYSTALS[m.b.wx]||[]).find(x=>x.name===c);html+=renderCrystalChip(c,d?d.dot:'#aaa',m.b.tg);});
    html+='</div>';
  } else {
    html+=`<div class="slabel">三合局水晶（三種各一顆）</div><div class="crow">`;
    m.cr.forEach(c=>{html+=renderCrystalChip(c.n,c.dot,c.wx);});
    html+=`</div><div class="slabel">三合成員</div><div class="wx-row">${m.members.map(x=>`<span class="wx-chip wx-ok">${x}</span>`).join('')}</div>`;
  }
  if(ana&&!suitable)html+=`<div class="warn-box">⚠️ 此組合化出五行與您的喜用神不符。建議僅在特殊場合（談判、上台、聯誼）當天佩戴，事後換回基礎配方。</div>`;
  html+='</div>';return html;
}

function getBazi(yId,mId,dId,hId){
  const y=parseInt(document.getElementById(yId)?.value);
  const m=parseInt(document.getElementById(mId)?.value);
  const d=parseInt(document.getElementById(dId)?.value);
  const h=parseInt(document.getElementById(hId)?.value);
  if(!y||!m||!d||isNaN(h))return null;
  const yearP=getYearGZ(y),monthP=getMonthGZ(y,m),dayP=getDayGZ(y,m,d),hourP=getHourGZ(dayP.tg,h);
  return{pillars:[yearP,monthP,dayP,hourP],m};
}

function switchTab(el,panelId){
  const scope=el.closest('.rcard,.wrap');
  scope.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  scope.querySelectorAll('.formula-panel').forEach(p=>p.classList.remove('active'));
  const panel=document.getElementById(panelId);if(panel)panel.classList.add('active');
}

function generate(){
  const body=document.getElementById('rBody');
  const rCrystals=document.getElementById('rCrystals');

  if(curMode==='single'){
    if(!selP1){alert('請選擇功效方向 ✨');return;}
    const bazi=getBazi('y1','m1','d1','h1');
    if(!bazi){alert('請完整填寫出生資訊 🌙');return;}
    const ana=analyzeChart(bazi.pillars,bazi.m);
    const pCfg=PURPOSE_CONFIG[selP1];
    const keys=ana.isStrong?pCfg.strong:pCfg.weak;

    document.getElementById('rName').textContent=`${pCfg.emoji} ${pCfg.label}・個人八字星陣`;
    document.getElementById('rSub').textContent=`${ana.dayWX}行日主・${ana.isStrong?'身強':'身弱'}・${ana.gotSeason?'得令':'失令'}`;
    rCrystals.innerHTML=ana.xishen.slice(0,3).map((wx,i)=>crystalSVG(WX_CRYSTAL_COLOR[wx],[24,20,26][i],[40,50,38][i])).join('');

    let html=`<div class="slabel">📅 您的四柱八字</div><div class="pillar-row">${bazi.pillars.map((p,i)=>renderPillar(p,['年柱','月柱','日柱','時柱'][i])).join('')}</div>`;
    html+=`<div class="slabel">🌊 五行統計</div><div class="wx-row">${['木','火','土','金','水'].map(wx=>{const c=ana.wxCount[wx];return`<span class="wx-chip ${c===0?'wx-miss':c===1?'wx-weak':'wx-ok'}">${WX_EMO[wx]}${wx}（${c===0?'缺':c===1?'弱':c+'個'}）</span>`;}).join('')}</div>`;
    html+=`<div class="xyshen-box"><div style="font-size:.75rem;color:#7a5a48;margin-bottom:.3rem;">⚖️ <strong>${ana.isStrong?'身強':'身弱'}</strong>・月令${ana.gotSeason?'得令 ✅':'失令'}</div>`;
    html+=`<div class="strength-bar"><div class="strength-fill" style="width:${ana.strength}%;background:linear-gradient(90deg,${ana.isStrong?'#E89AAE,#F0B87A':'#7EC8C8,#C4A8D4'})"></div></div>`;
    html+=`<div style="font-size:.7rem;color:#9b7e6a;margin:.3rem 0 .4rem;">喜用神（補這些五行）</div><div class="xy-row">${ana.xishen.map(wx=>`<span class="xy-chip xy-like">${WX_EMO[wx]} ${wx}</span>`).join('')}</div>`;
    html+=`<div style="font-size:.7rem;color:#9b7e6a;margin:.4rem 0 .3rem;">忌神（請避開這些）</div><div class="xy-row">${ana.jishen.map(wx=>`<span class="xy-chip xy-hate">${WX_EMO[wx]} ${wx}</span>`).join('')}</div></div>`;
    html+=`<div class="div"></div><div class="slabel">💫 進階水晶配法</div>`;
    const tabsHtml=keys.map((key,i)=>`<div class="ftab${i===0?' active':''}" onclick="switchTab(this,'fp${i}')">${findMethod(key)?.name||'配法'}</div>`).join('')+`<div class="ftab" onclick="switchTab(this,'fp-base')">🌱 日常基礎</div>`;
    html+=`<div class="formula-tabs">${tabsHtml}</div>`;
    keys.forEach((key,i)=>{html+=renderMethodPanel(key,ana,i,i===0);});
    html+=`<div class="formula-panel" id="fp-base"><div class="ok-box">✅ 最安全·適合每天佩戴的基礎配方</div><div class="crow">`;
    ana.xishen.forEach(wx=>{(CRYSTALS[wx]||[]).slice(0,2).forEach(c=>{html+=renderCrystalChip(c.name,c.dot,c.note);});});
    html+=`</div><div class="fblock" style="border-left-color:#E8A898;font-size:.75rem">❌ 請避開忌神水晶：`;
    ana.jishen.forEach(wx=>{html+=`<span style="color:#b06040">${(CRYSTALS[wx]||[]).map(c=>c.name).join('、')}（${wx}）</span> `;});
    html+='</div></div>';
    body.innerHTML=html;

  } else {
    if(!selP2){alert('請選擇合盤目標 ✨');return;}
    const baziA=getBazi('y2a','m2a','d2a','h2a');
    const baziB=getBazi('y2b','m2b','d2b','h2b');
    if(!baziA||!baziB){alert('請完整填寫兩人出生資訊 🌙');return;}
    const anaA=analyzeChart(baziA.pillars,baziA.m);
    const anaB=analyzeChart(baziB.pillars,baziB.m);
    const pCfg=PURPOSE_CONFIG[selP2];
    const sharedXi=[...new Set([...anaA.xishen,...anaB.xishen])];
    const interRel=RELATION[anaA.dayWX][anaB.dayWX];
    const relDesc={比劫:'同類互助，頻率接近',食傷:'您滋養對方，給予較多',財星:'您主導對方，帶給他穩定',官殺:'對方主導您，帶給您約束',印星:'對方滋養您，被他照顧'};

    document.getElementById('rName').textContent=`${pCfg.emoji} ${pCfg.label}・夫妻合盤`;
    document.getElementById('rSub').textContent=`本人${anaA.dayWX}行${anaA.isStrong?'身強':'身弱'} × 伴侶${anaB.dayWX}行${anaB.isStrong?'身強':'身弱'}`;
    rCrystals.innerHTML=sharedXi.slice(0,3).map((wx,i)=>crystalSVG(WX_CRYSTAL_COLOR[wx],[24,20,26][i],[40,50,38][i])).join('');

    let html=`<div class="g2" style="gap:.5rem;margin-bottom:.5rem;">`;
    [{label:'👩 本人',ana:anaA,pillars:baziA.pillars},{label:'👨 伴侶',ana:anaB,pillars:baziB.pillars}].forEach(({label,ana,pillars})=>{
      html+=`<div class="card" style="margin:0;padding:.85rem;border-color:#e0d0ec;"><div class="slabel">${label}</div>
      <div class="pillar-row" style="grid-template-columns:repeat(2,1fr);">${pillars.slice(0,2).map((p,i)=>renderPillar(p,['年','月'][i])).join('')}</div>
      <div class="pillar-row" style="grid-template-columns:repeat(2,1fr);">${pillars.slice(2,4).map((p,i)=>renderPillar(p,['日','時'][i])).join('')}</div>
      <div style="margin-top:.5rem;font-size:.72rem;">
        <span style="color:${WX_COLOR[ana.dayWX]}">日主${ana.dayWX}${WX_EMO[ana.dayWX]}</span>　<span style="color:#9b7e6a">${ana.isStrong?'身強':'身弱'}</span><br>
        <span style="color:#508050">喜：${ana.xishen.map(w=>WX_EMO[w]+w).join(' ')}</span><br>
        <span style="color:#b06040">忌：${ana.jishen.map(w=>WX_EMO[w]+w).join(' ')}</span>
      </div></div>`;
    });
    html+='</div>';
    html+=`<div class="fblock"><strong>兩人日主互動</strong>：${anaA.dayWX}${WX_EMO[anaA.dayWX]} × ${anaB.dayWX}${WX_EMO[anaB.dayWX]}<br>
    關係：<span style="color:#7a5a48">${relDesc[interRel]||interRel}</span><br>
    共同喜用神：${sharedXi.map(w=>`<span style="color:#508050">${WX_EMO[w]}${w}</span>`).join(' ')}</div>`;
    html+=`<div class="div"></div><div class="slabel">💫 合盤水晶配方（本人佩戴）</div>`;
    const coupleKey=pCfg.couple;
    const cm=findMethod(coupleKey);
    html+=`<div class="formula-tabs"><div class="ftab active" onclick="switchTab(this,'cfp0')">🌟 主推配方</div><div class="ftab" onclick="switchTab(this,'cfp-base')">🌱 基礎合盤</div></div>`;
    html+=`<div class="formula-panel active" id="cfp0">`;
    if(cm){
      const suiA=anaA.xishen.includes(cm.wx),suiB=anaB.xishen.includes(cm.wx);
      html+=`<div class="fblock"><strong>${cm.name}</strong>（化氣→${WX_EMO[cm.wx]}${cm.wx}）<br>${cm.desc}<br>`;
      html+=`${suiA?'<span style="color:#508050">✅ 符合本人喜用</span>':'<span style="color:#b06040">⚠️ 非本人喜用</span>'} `;
      html+=`${suiB?'<span style="color:#508050">✅ 符合伴侶喜用</span>':'<span style="color:#b06040">⚠️ 非伴侶喜用</span>'}</div><div class="crow">`;
      if(isTG(coupleKey)){cm.a.cr.forEach(c=>{const d=(CRYSTALS[cm.a.wx]||[]).find(x=>x.name===c);html+=renderCrystalChip(c,d?d.dot:'#aaa','');});cm.b.cr.forEach(c=>{const d=(CRYSTALS[cm.b.wx]||[]).find(x=>x.name===c);html+=renderCrystalChip(c,d?d.dot:'#aaa','');});}
      else{cm.cr.forEach(c=>{html+=renderCrystalChip(c.n,c.dot,c.wx);});}
      html+='</div>';
    }
    html+='</div>';
    html+=`<div class="formula-panel" id="cfp-base"><div class="ok-box">✅ 雙方共同喜用神組合，最安全穩定</div><div class="crow">`;
    sharedXi.forEach(wx=>{(CRYSTALS[wx]||[]).slice(0,2).forEach(c=>{html+=renderCrystalChip(c.name,c.dot,c.note);});});
    html+='</div></div>';
    body.innerHTML=html;
  }

  document.getElementById('fSec').style.display='none';
  const rs=document.getElementById('rSec');rs.style.display='block';rs.classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function doReset(){
  document.getElementById('fSec').style.display='block';
  const rs=document.getElementById('rSec');rs.style.display='none';rs.classList.remove('show');
  selP1=null;selP2=null;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  window.scrollTo({top:0,behavior:'smooth'});
}

initDots();
initPGrid('pgrid1',id=>{selP1=id;});
initPGrid('pgrid2',id=>{selP2=id;});
initDays();
</script>
